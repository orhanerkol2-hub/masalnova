<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imprint — MasalNova</title>
  <meta name="robots" content="noindex, noarchive, nosnippet" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root { --blue-2:#1b4fc4; --blue-3:#133a9e; --gold:#ffb01f; --soft:rgba(255,255,255,.85); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', system-ui, sans-serif; color: #fff; line-height: 1.7;
      background: linear-gradient(180deg, var(--blue-2), var(--blue-3));
      min-height: 100vh; padding: 0 22px;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 40px 0 70px; }
    .top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; flex-wrap: wrap; gap: 14px; }
    .top img.brand { height: 42px; }
    .back { color: var(--gold); text-decoration: none; font-family: 'Baloo 2', cursive; font-weight: 700; }
    .back:hover { text-decoration: underline; }
    h1 { font-family: 'Baloo 2', cursive; font-size: 2rem; margin-bottom: 8px; }
    p { color: var(--soft); margin-bottom: 8px; }
    .imprint-img {
      display: block; width: 100%; height: auto; margin-top: 18px;
      border-radius: 18px; border: 1px solid rgba(255,255,255,.18);
    }
    .note { font-size: .85rem; color: rgba(255,255,255,.6); margin-top: 28px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <a href="index.html"><img class="brand" src="logo.png" alt="MasalNova" /></a>
      <a class="back" href="index.html">← Home</a>
    </div>

    <h1>Imprint / Legal Notice</h1>
    <p>Information pursuant to § 5 DDG (German Digital Services Act).</p>

    <!-- Impressum als Bild (bewusst nicht als durchsuchbarer Text) -->
    <img class="imprint-img" src="Imprint.png" alt="Imprint / Legal Notice" />
  </div>
</body>
</html>
